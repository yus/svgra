<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>SVGRA_animator // 3D_PROJ</title>
    
    <!-- Pixel font Cyroglyph — 8px base -->
    <style>
        @font-face {
            font-family: 'Cyroglyph';
            src: url('https://raw.githubusercontent.com/yusdesign/cyroglyph/master/assets/fonts/cyroglyph.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        
        /* RESET — pixel perfect, no rounding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background: #fef8ef;
            font-family: 'Cyroglyph', 'Courier New', monospace;
            /* enforce 8px system — no rem scaling interference */
            font-size: 8px;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            font-smoothing: none;
            -webkit-font-smoothing: none;
        }
        
        /* force all text to 8px pixel grid */
        body, button, .menu-btn, .dropdown, .modal-content-pixel, .param-row, .value-badge, .info-line {
            font-size: 8px;
            line-height: 1.25;
            letter-spacing: 0.2px;
            font-family: 'Cyroglyph', monospace;
            text-transform: uppercase;
        }
        
        /* TOP BAR — hard pixel, no blur, no border radius */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: #191511;
            border-bottom: 1px solid #7f6a4c;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 8px;
            backdrop-filter: none;
            box-shadow: none;
        }
        
        /* compact block */
        .menu-group {
            display: flex;
            gap: 4px;
            align-items: baseline;
        }
        
        /* pixel button — square-ish, no rounding */
        .pixel-btn {
            background: #2a241e;
            border: 1px solid #6f5b42;
            color: #eedbbc;
            padding: 4px 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: none;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .pixel-btn:hover {
            background: #4e3b2a;
            border-color: #b99060;
            color: #fff2df;
        }
        
        .logo {
            background: #0e0c09;
            border: 1px solid #5f4b34;
            padding: 4px 8px;
            color: #e7cfaa;
            font-size: 8px;
        }
        
        /* DROPDOWN — absolute, sharp edges, no rounding */
        .dropdown-pixel {
            position: absolute;
            top: 34px;
            left: 0;
            background: #1e1a15;
            border: 1px solid #7f684c;
            padding: 8px 10px;
            min-width: 210px;
            display: none;
            z-index: 210;
            flex-direction: column;
            gap: 10px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }
        
        .dropdown-pixel.active {
            display: flex;
        }
        
        /* parameter rows: compact 8px grid */
        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            color: #e9dccd;
            border-bottom: 0px solid #4f3f2e;
            padding-bottom: 2px;
        }
        
        .param-row label {
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        /* range slider — minimal pixel style */
        input[type="range"] {
            width: 130px;
            height: 2px;
            -webkit-appearance: none;
            background: #4d3e2c;
            border: none;
            margin: 0;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 6px;
            height: 12px;
            background: #e7bc7c;
            border: none;
            border-radius: 0px;
            cursor: pointer;
        }
        
        .value-badge {
            background: #0f0d09;
            padding: 2px 5px;
            border: 1px solid #5f4a32;
            color: #e9cfab;
            min-width: 32px;
            text-align: center;
            font-size: 8px;
        }
        
        .divider-pixel {
            height: 1px;
            background: #5d4b36;
            margin: 4px 0;
        }
        
        .info-line {
            color: #ae987c;
            padding-top: 4px;
            font-size: 7px;
            letter-spacing: 0.3px;
            border-top: 1px solid #4d3d2b;
        }
        
        /* modal window — pixel perfect, no rounding */
        .modal-pixel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 8, 6, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: none;
        }
        
        .modal-pixel.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-content-pixel {
            background: #201c17;
            border: 1px solid #c6a06c;
            padding: 16px;
            max-width: 300px;
            width: 85%;
            color: #ecdbba;
            font-size: 8px;
            box-shadow: 6px 6px 0px #0b0906;
        }
        
        .modal-content-pixel h3 {
            font-size: 9px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            border-bottom: 1px solid #6f553c;
            display: inline-block;
        }
        
        .modal-content-pixel p {
            margin: 8px 0;
            line-height: 1.35;
        }
        
        .close-pixel {
            background: #4b3a28;
            border: 1px solid #b68b58;
            color: #f7e7cf;
            padding: 4px 12px;
            cursor: pointer;
            margin-top: 12px;
            font-size: 8px;
            text-transform: uppercase;
        }
        
        /* position relative for dropdown anchor */
        .menu-relative {
            position: relative;
        }
        
        /* no rounding anywhere */
        button, .pixel-btn, .logo, .dropdown-pixel, .modal-content-pixel, .value-badge {
            border-radius: 0px;
        }
        
        /* canvas full */
        canvas {
            display: block;
            outline: none;
        }
        
        /* ultra compact mobile */
        @media (max-width: 640px) {
            .top-bar {
                padding: 5px 8px;
                gap: 6px;
            }
            .pixel-btn, .logo {
                padding: 3px 6px;
            }
            .dropdown-pixel {
                min-width: 185px;
                left: -4px;
                top: 32px;
            }
            .param-row {
                gap: 8px;
            }
            input[type="range"] {
                width: 100px;
            }
            .value-badge {
                min-width: 28px;
            }
        }
        
        /* force pixelated rendering */
        img, canvas, .pixel-btn {
            image-rendering: crisp-edges;
        }
        
        /* hide old garbage */
        .controls-panel, .top-menu {
            display: none;
        }
    </style>
</head>
<body>
    <!-- ULTRA COMPACT TOP BAR — 8px PIXEL UI -->
    <div class="top-bar">
        <div class="menu-group">
            <div class="logo">◯ SVGRA_ANIM</div>
            <div class="menu-relative" id="sceneMenuWrap">
                <button class="pixel-btn" id="sceneMenuBtn">[SCENE] ▼</button>
                <div id="sceneDropdown" class="dropdown-pixel">
                    <div class="param-row">
                        <label>💡 LIGHT</label>
                        <input type="range" id="lightIntensity" min="0.4" max="2.0" step="0.01" value="1.18">
                        <span id="intensityVal" class="value-badge">1.18</span>
                    </div>
                    <div class="param-row">
                        <label>🌫 SHADOW_S</label>
                        <input type="range" id="shadowSoftness" min="0.2" max="1.5" step="0.01" value="0.65">
                        <span id="shadowSoftVal" class="value-badge">0.65</span>
                    </div>
                    <div class="divider-pixel"></div>
                    <div class="info-line">
                        MOUSE: ROTATE | RIGHT:PAN<br>
                        3D → SHADOW PROJECTION
                    </div>
                </div>
            </div>
        </div>
        <button class="pixel-btn" id="helpButton">[ ? ]</button>
    </div>

    <!-- MODAL (INFO) -->
    <div id="modalPixel" class="modal-pixel">
        <div class="modal-content-pixel">
            <h3>◯ 3D PROJECTION</h3>
            <p>REAL-TIME 3D SPHERE + PHYSICAL SHADOW.<br>
            LIGHT & SHADOW CALCULATED.<br>
            VOLUME PERCEIVED THROUGH TONE, NOT OUTLINE.</p>
            <p>PARAMS: LIGHT INTENSITY / SHADOW SOFTNESS.</p>
            <button class="close-pixel" id="closeModalBtn">[ CLOSE ]</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- setup scene (preserved perfect quality) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfef8ef);
        scene.fog = new THREE.FogExp2(0xfef8ef, 0.0025);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.2, 0);
        
        // --- LIGHTS ---
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.18);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 8;
        mainLight.shadow.camera.left = -2.8;
        mainLight.shadow.camera.right = 2.8;
        mainLight.shadow.camera.top = 2.8;
        mainLight.shadow.camera.bottom = -2.8;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xe0d0bc, 0.35);
        fillLight.position.set(0, -1.5, 1);
        fillLight.castShadow = false;
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffe6c4, 0.4);
        backLight.position.set(-1.5, 1.8, -2);
        backLight.castShadow = false;
        scene.add(backLight);
        
        const ambientLight = new THREE.AmbientLight(0xefe4d4, 0.45);
        scene.add(ambientLight);
        
        // --- shadow receiver (plane) ---
        const shadowReceiver = new THREE.Mesh(
            new THREE.PlaneGeometry(6, 6),
            new THREE.ShadowMaterial({ opacity: 0.45, color: 0x5a4a3a, transparent: true, side: THREE.DoubleSide })
        );
        shadowReceiver.rotation.x = -Math.PI / 2;
        shadowReceiver.position.y = -0.85;
        shadowReceiver.receiveShadow = true;
        scene.add(shadowReceiver);
        
        // --- BALL ---
        const ballGeometry = new THREE.SphereGeometry(0.85, 128, 128);
        const ballMaterial = new THREE.MeshStandardMaterial({
            color: 0xfef5e8,
            roughness: 0.38,
            metalness: 0.08,
            side: THREE.DoubleSide
        });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.castShadow = true;
        ball.receiveShadow = false;
        ball.position.set(0, 0.15, 0);
        scene.add(ball);
        
        // particles (ambiance)
        const particleCount = 160;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radiusP = 1.1 + Math.random() * 0.9;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i*3] = Math.sin(phi) * Math.cos(theta) * radiusP;
            particlePositions[i*3+1] = Math.sin(phi) * Math.sin(theta) * radiusP + 0.15;
            particlePositions[i*3+2] = Math.cos(phi) * radiusP;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0xcbb894, size: 0.012, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // subtle glow
        const glowGeometry = new THREE.SphereGeometry(0.92, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({ color: 0xfef0e0, transparent: true, opacity: 0.07, side: THREE.BackSide });
        const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glowSphere);
        
        // grid + ring
        const gridHelper = new THREE.GridHelper(5.2, 20, 0xd8cbb8, 0xe5d8c8);
        gridHelper.position.y = -0.84;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.22;
        scene.add(gridHelper);
        
        const contactRingGeometry = new THREE.RingGeometry(0.65, 0.85, 32);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0xdac09e, transparent: true, opacity: 0.28, roughness: 0.7 });
        const contactRing = new THREE.Mesh(contactRingGeometry, ringMaterial);
        contactRing.rotation.x = -Math.PI / 2;
        contactRing.position.y = -0.84;
        scene.add(contactRing);
        
        // CSS2D tiny label (pixel style)
        const css2DRenderer = new CSS2DRenderer();
        css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        css2DRenderer.domElement.style.position = 'absolute';
        css2DRenderer.domElement.style.top = '0px';
        css2DRenderer.domElement.style.left = '0px';
        css2DRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(css2DRenderer.domElement);
        
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '⚪3D_PROJ';
        labelDiv.style.fontFamily = 'Cyroglyph, monospace';
        labelDiv.style.fontSize = '7px';
        labelDiv.style.color = '#bda47e';
        labelDiv.style.background = 'none';
        labelDiv.style.opacity = '0.55';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, 1.28, 0);
        scene.add(labelObj);
        
        // decorative arrow (light dir)
        const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(1, 1.2, 0.6).normalize(), new THREE.Vector3(1.5, 1.2, 1.2), 1.2, 0xdac09e, 0.5, 0.4);
        arrowHelper.line.material.transparent = true;
        arrowHelper.line.material.opacity = 0.18;
        arrowHelper.cone.material.transparent = true;
        arrowHelper.cone.material.opacity = 0.2;
        scene.add(arrowHelper);
        
        // --- UI elements ---
        const intensitySlider = document.getElementById('lightIntensity');
        const intensityVal = document.getElementById('intensityVal');
        const shadowSlider = document.getElementById('shadowSoftness');
        const shadowSoftVal = document.getElementById('shadowSoftVal');
        const sceneMenuBtn = document.getElementById('sceneMenuBtn');
        const sceneDropdown = document.getElementById('sceneDropdown');
        const helpBtn = document.getElementById('helpButton');
        const modal = document.getElementById('modalPixel');
        const closeModal = document.getElementById('closeModalBtn');
        
        function updateLightIntensity(val) {
            mainLight.intensity = parseFloat(val);
            intensityVal.innerText = val;
        }
        
        function updateShadowSoftness(val) {
            const soft = Math.max(0.3, Math.min(1.6, val));
            const newSize = 2.2 + (1.3 - soft) * 1.1;
            mainLight.shadow.camera.left = -newSize;
            mainLight.shadow.camera.right = newSize;
            mainLight.shadow.camera.top = newSize;
            mainLight.shadow.camera.bottom = -newSize;
            mainLight.shadow.camera.updateProjectionMatrix();
            if (shadowReceiver.material) {
                const newOp = Math.min(0.62, Math.max(0.32, 0.45 * (1.2 - (soft - 0.6) * 0.25)));
                shadowReceiver.material.opacity = newOp;
            }
            shadowSoftVal.innerText = val.toFixed(2);
        }
        
        intensitySlider.addEventListener('input', (e) => updateLightIntensity(e.target.value));
        shadowSlider.addEventListener('input', (e) => updateShadowSoftness(parseFloat(e.target.value)));
        updateLightIntensity(intensitySlider.value);
        updateShadowSoftness(parseFloat(shadowSlider.value));
        
        // dropdown toggle
        sceneMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sceneDropdown.classList.toggle('active');
        });
        
        document.addEventListener('click', (e) => {
            if (!sceneMenuBtn.contains(e.target) && !sceneDropdown.contains(e.target)) {
                sceneDropdown.classList.remove('active');
            }
        });
        
        helpBtn.addEventListener('click', () => modal.classList.add('active'));
        closeModal.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
        
        // animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            particles.rotation.y = time * 0.12;
            particles.rotation.x = Math.sin(time * 0.2) * 0.08;
            contactRing.rotation.z = time * 0.08;
            fillLight.intensity = 0.35 + Math.sin(time * 0.5) * 0.04;
            controls.update();
            renderer.render(scene, camera);
            css2DRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            css2DRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // close dropdown on mobile default
        if (window.innerWidth <= 640) sceneDropdown.classList.remove('active');
        
        console.log('SVGRA ANIMATOR | 8px PIXEL UI | CYROGLYPH ACTIVE');
    </script>
</body>
</html>
