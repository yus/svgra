<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SVG Studio Pro | Object Manager & Animation Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0c12 0%, #0f1119 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Main layout */
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar - Object Menu & Properties */
        .sidebar {
            width: 320px;
            background: rgba(18, 22, 32, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        /* Object Menu Section */
        .object-menu-section {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8b9bcf;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .objects-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
        }

        .object-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .object-item:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            transform: translateX(4px);
        }

        .object-item.selected {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.25), rgba(59, 130, 246, 0.1));
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }

        .object-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .object-info {
            flex: 1;
        }

        .object-name {
            font-weight: 600;
            color: #e2e8ff;
            font-size: 14px;
        }

        .object-type {
            font-size: 10px;
            color: #8b9bcf;
            margin-top: 2px;
        }

        .visibility-toggle {
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .visibility-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Properties Panel */
        .properties-panel {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .property-group {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .property-label {
            color: #cdd9ff;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        input, select {
            width: 100%;
            background: #0a0e14;
            border: 1px solid #2c3442;
            padding: 8px 12px;
            border-radius: 10px;
            color: white;
            font-size: 13px;
        }

        input[type="range"] {
            padding: 0;
            height: 4px;
            background: #2a2f3a;
        }

        button {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button.primary {
            background: #3b82f6;
            border-color: #60a5fa;
        }

        button.primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .flex-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        /* Canvas Area - Expanded Workspace */
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1e2a;
        }

        .workspace {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 800px;
            background: 
                radial-gradient(circle at 20% 30%, #2a2f3f, #141824),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px black;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: visible;
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        .controls-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            z-index: 20;
        }

        .badge {
            background: #00000099;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e14;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar: Object Menu + Properties -->
    <div class="sidebar">
        <div class="object-menu-section">
            <div class="section-title">📦 OBJECT MENU</div>
            <div class="objects-list" id="objectsList"></div>
            <div class="flex-row" style="margin-top: 16px;">
                <button id="addObjectBtn" style="flex: 1;">➕ Add Object</button>
                <button id="duplicateBtn" style="flex: 1;">📋 Duplicate</button>
            </div>
        </div>

        <div class="properties-panel">
            <div class="section-title">⚙️ SELECTED OBJECT PROPERTIES</div>
            
            <div class="property-group">
                <div class="property-label">🎯 TRANSFORM</div>
                <div class="property-label">X: <span id="posX">0</span></div>
                <input type="range" id="posXSlider" min="-400" max="400" step="1" value="0">
                <div class="property-label" style="margin-top: 8px;">Y: <span id="posY">0</span></div>
                <input type="range" id="posYSlider" min="-400" max="400" step="1" value="0">
                <div class="property-label">🔄 Rotation: <span id="rotVal">0</span>°</div>
                <input type="range" id="rotSlider" min="-180" max="180" step="1" value="0">
                <div class="property-label">📏 Scale: <span id="scaleVal">1.00</span></div>
                <input type="range" id="scaleSlider" min="0.2" max="3" step="0.01" value="1">
            </div>

            <div class="property-group">
                <div class="property-label">🎨 APPEARANCE</div>
                <div class="property-label">Fill Color</div>
                <input type="color" id="fillColor" value="#FF6B6B">
                <div class="property-label" style="margin-top: 8px;">Stroke Width: <span id="strokeVal">2</span></div>
                <input type="range" id="strokeWidth" min="0" max="8" step="0.5" value="2">
                <div class="property-label">Stroke Color</div>
                <input type="color" id="strokeColor" value="#2c3e50">
            </div>

            <div class="property-group">
                <div class="property-label">✨ ANIMATION (per object)</div>
                <select id="animTypeSelect">
                    <option value="none">🚫 No Animation</option>
                    <option value="orbit">🌍 Orbit Motion</option>
                    <option value="bounce">🏀 Bounce</option>
                    <option value="spin">💫 Continuous Spin</option>
                    <option value="pulse">❤️ Pulse Scale</option>
                    <option value="wobble">🎢 Wobble</option>
                </select>
                <div class="property-label">Speed: <span id="animSpeedVal">1.0</span></div>
                <input type="range" id="animSpeed" min="0.5" max="3" step="0.1" value="1">
                <div class="flex-row" style="margin-top: 12px;">
                    <button id="applyAnimBtn" class="primary" style="flex:1;">▶ Apply Animation</button>
                    <button id="stopAnimBtn" style="flex:1;">⏹️ Stop</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Canvas Area with Expanded Workspace -->
    <div class="canvas-area">
        <div class="workspace">
            <svg id="mainSvg" viewBox="-600 -400 1200 800" style="background: #faf9f8;">
                <!-- Objects will be dynamically added here -->
            </svg>
        </div>
        <div class="controls-bar">
            <span id="animGlobalStatus" class="badge">● Idle</span>
            <button id="resetCameraBtn">🎯 Reset View</button>
            <button id="exportBtn">💾 Export SVG</button>
        </div>
    </div>
</div>

<script>
    // Object Manager
    class SVGObject {
        constructor(id, type, name, x, y, fill, stroke, strokeWidth) {
            this.id = id;
            this.type = type;
            this.name = name;
            this.x = x;
            this.y = y;
            this.rotation = 0;
            this.scale = 1;
            this.fill = fill;
            this.stroke = stroke;
            this.strokeWidth = strokeWidth;
            this.visible = true;
            this.animation = {
                type: 'none',
                speed: 1,
                phase: 0,
                active: false
            };
        }

        createSVGElement() {
            let elem;
            switch(this.type) {
                case 'star':
                    elem = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    elem.setAttribute("points", "0,-25 10,-8 28,-8 16,3 22,25 0,15 -22,25 -16,3 -28,-8 -10,-8");
                    break;
                case 'circle':
                    elem = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    elem.setAttribute("r", "25");
                    break;
                case 'rect':
                    elem = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    elem.setAttribute("width", "50");
                    elem.setAttribute("height", "50");
                    elem.setAttribute("rx", "8");
                    break;
                case 'triangle':
                    elem = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    elem.setAttribute("points", "0,-28 24,14 -24,14");
                    break;
                default:
                    elem = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    elem.setAttribute("r", "25");
            }
            elem.setAttribute("fill", this.fill);
            elem.setAttribute("stroke", this.stroke);
            elem.setAttribute("stroke-width", this.strokeWidth);
            elem.setAttribute("data-id", this.id);
            return elem;
        }

        updateTransform(elem) {
            const transform = `translate(${this.x}, ${this.y}) rotate(${this.rotation}) scale(${this.scale})`;
            elem.setAttribute("transform", transform);
        }
    }

    class SVGManager {
        constructor(svgElement) {
            this.svg = svgElement;
            this.objects = new Map();
            this.nextId = 1;
            this.selectedId = null;
            this.animationFrame = null;
            this.initDefaultObjects();
            this.startGlobalAnimation();
        }

        initDefaultObjects() {
            this.addObject('star', 'Star 1', -200, -150, '#FF6B6B', '#c0392b', 2);
            this.addObject('circle', 'Circle 1', 250, -100, '#4ECDC4', '#2c3e50', 2);
            this.addObject('rect', 'Box 1', -180, 200, '#95E77E', '#27ae60', 2);
            this.addObject('triangle', 'Triangle 1', 220, 180, '#FFE66D', '#e67e22', 2);
        }

        addObject(type, name, x, y, fill, stroke, strokeWidth) {
            const id = this.nextId++;
            const obj = new SVGObject(id, type, name, x, y, fill, stroke, strokeWidth);
            this.objects.set(id, obj);
            this.renderObject(obj);
            this.updateUI();
            return id;
        }

        renderObject(obj) {
            let elem = this.svg.querySelector(`[data-id="${obj.id}"]`);
            if (!elem) {
                elem = obj.createSVGElement();
                elem.setAttribute("data-id", obj.id);
                this.svg.appendChild(elem);
            }
            obj.updateTransform(elem);
            elem.setAttribute("visibility", obj.visible ? "visible" : "hidden");
            elem.setAttribute("fill", obj.fill);
            elem.setAttribute("stroke", obj.stroke);
            elem.setAttribute("stroke-width", obj.strokeWidth);
        }

        updateObjectProperties(id, updates) {
            const obj = this.objects.get(id);
            if (!obj) return;
            Object.assign(obj, updates);
            this.renderObject(obj);
            this.updateUI();
        }

        deleteObject(id) {
            const elem = this.svg.querySelector(`[data-id="${id}"]`);
            if (elem) elem.remove();
            this.objects.delete(id);
            if (this.selectedId === id) this.selectedId = null;
            this.updateUI();
        }

        duplicateObject(id) {
            const original = this.objects.get(id);
            if (!original) return;
            const newId = this.addObject(original.type, `${original.name} (copy)`, original.x + 30, original.y + 30, original.fill, original.stroke, original.strokeWidth);
            const newObj = this.objects.get(newId);
            newObj.rotation = original.rotation;
            newObj.scale = original.scale;
            this.renderObject(newObj);
            return newId;
        }

        getSelected() {
            return this.selectedId ? this.objects.get(this.selectedId) : null;
        }

        updateUI() {
            // Refresh object list
            const container = document.getElementById('objectsList');
            container.innerHTML = '';
            this.objects.forEach(obj => {
                const div = document.createElement('div');
                div.className = `object-item ${this.selectedId === obj.id ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="object-icon">${obj.type === 'star' ? '⭐' : obj.type === 'circle' ? '●' : obj.type === 'rect' ? '■' : '▲'}</div>
                    <div class="object-info">
                        <div class="object-name">${obj.name}</div>
                        <div class="object-type">${obj.type}</div>
                    </div>
                    <div class="visibility-toggle" data-id="${obj.id}" data-vis="${obj.visible}">
                        ${obj.visible ? '👁️' : '👁️‍🗨️'}
                    </div>
                `;
                div.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('visibility-toggle')) {
                        this.selectObject(obj.id);
                    }
                });
                const toggle = div.querySelector('.visibility-toggle');
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    obj.visible = !obj.visible;
                    this.renderObject(obj);
                    this.updateUI();
                });
                container.appendChild(div);
            });
            
            // Update property panel if object selected
            const selected = this.getSelected();
            if (selected) {
                document.getElementById('posXSlider').value = selected.x;
                document.getElementById('posYSlider').value = selected.y;
                document.getElementById('rotSlider').value = selected.rotation;
                document.getElementById('scaleSlider').value = selected.scale;
                document.getElementById('fillColor').value = selected.fill;
                document.getElementById('strokeWidth').value = selected.strokeWidth;
                document.getElementById('strokeColor').value = selected.stroke;
                document.getElementById('animTypeSelect').value = selected.animation.type;
                document.getElementById('animSpeed').value = selected.animation.speed;
                
                document.getElementById('posX').innerText = selected.x;
                document.getElementById('posY').innerText = selected.y;
                document.getElementById('rotVal').innerText = selected.rotation;
                document.getElementById('scaleVal').innerText = selected.scale.toFixed(2);
                document.getElementById('strokeVal').innerText = selected.strokeWidth;
            }
        }

        selectObject(id) {
            this.selectedId = id;
            this.updateUI();
        }

        startGlobalAnimation() {
            let lastTime = 0;
            const animate = (currentTime) => {
                if (!lastTime) lastTime = currentTime;
                let delta = Math.min(32, currentTime - lastTime) / 1000;
                if (delta > 0.01) {
                    this.objects.forEach(obj => {
                        if (obj.animation.type !== 'none' && obj.animation.active && obj.visible) {
                            obj.animation.phase += delta * Math.PI * 2 * obj.animation.speed;
                            if (obj.animation.phase > Math.PI * 2) obj.animation.phase -= Math.PI * 2;
                            
                            let tx = 0, ty = 0, rot = 0, scale = 1;
                            const phase = obj.animation.phase;
                            switch(obj.animation.type) {
                                case 'orbit':
                                    tx = Math.cos(phase) * 80;
                                    ty = Math.sin(phase) * 60;
                                    rot = phase * 50;
                                    scale = 1 + Math.sin(phase * 2) * 0.2;
                                    break;
                                case 'bounce':
                                    tx = Math.sin(phase * 2) * 50;
                                    ty = Math.abs(Math.sin(phase)) * 70 - 35;
                                    rot = Math.sin(phase * 3) * 30;
                                    scale = 0.8 + Math.sin(phase) * 0.3;
                                    break;
                                case 'spin':
                                    tx = 0;
                                    ty = 0;
                                    rot = phase * 360;
                                    scale = 1;
                                    break;
                                case 'pulse':
                                    tx = 0;
                                    ty = 0;
                                    rot = 0;
                                    scale = 0.7 + Math.sin(phase * 2) * 0.3;
                                    break;
                                case 'wobble':
                                    tx = Math.sin(phase * 3) * 30;
                                    ty = Math.cos(phase * 2.5) * 25;
                                    rot = Math.sin(phase * 4) * 40;
                                    scale = 1 + Math.sin(phase * 3) * 0.15;
                                    break;
                            }
                            
                            obj.x += (tx - (obj.originalX || 0)) * 0.1;
                            obj.y += (ty - (obj.originalY || 0)) * 0.1;
                            obj.rotation += rot * 0.1;
                            obj.scale += (scale - obj.scale) * 0.1;
                            
                            if (!obj.originalX) {
                                obj.originalX = obj.x;
                                obj.originalY = obj.y;
                            }
                            
                            this.renderObject(obj);
                        }
                    });
                    this.updateUI();
                }
                lastTime = currentTime;
                this.animationFrame = requestAnimationFrame(animate);
            };
            this.animationFrame = requestAnimationFrame(animate);
        }

        applyAnimationToSelected() {
            const selected = this.getSelected();
            if (!selected) return;
            const animType = document.getElementById('animTypeSelect').value;
            const speed = parseFloat(document.getElementById('animSpeed').value);
            selected.animation.type = animType;
            selected.animation.speed = speed;
            selected.animation.active = animType !== 'none';
            selected.animation.phase = 0;
            selected.originalX = selected.x;
            selected.originalY = selected.y;
            document.getElementById('animGlobalStatus').innerHTML = `✨ ${animType} active`;
            setTimeout(() => {
                if (selected.animation.type === animType)
                    document.getElementById('animGlobalStatus').innerHTML = `● Animating`;
            }, 2000);
        }

        stopSelectedAnimation() {
            const selected = this.getSelected();
            if (selected) {
                selected.animation.type = 'none';
                selected.animation.active = false;
                document.getElementById('animGlobalStatus').innerHTML = `● Idle`;
                this.updateUI();
            }
        }

        resetView() {
            // Reset all objects positions to original
            this.objects.forEach(obj => {
                if (obj.originalX) {
                    obj.x = obj.originalX;
                    obj.y = obj.originalY;
                }
                obj.rotation = 0;
                obj.scale = 1;
                obj.animation.phase = 0;
                this.renderObject(obj);
            });
            this.updateUI();
        }

        exportSVG() {
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(this.svg);
            const blob = new Blob([svgString], {type: "image/svg+xml"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "animation_export.svg";
            a.click();
            URL.revokeObjectURL(url);
        }
    }

    // Initialize application
    const svg = document.getElementById('mainSvg');
    const manager = new SVGManager(svg);

    // Event listeners
    document.getElementById('posXSlider').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { x: parseFloat(e.target.value) });
    });
    document.getElementById('posYSlider').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { y: parseFloat(e.target.value) });
    });
    document.getElementById('rotSlider').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { rotation: parseFloat(e.target.value) });
    });
    document.getElementById('scaleSlider').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { scale: parseFloat(e.target.value) });
    });
    document.getElementById('fillColor').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { fill: e.target.value });
    });
    document.getElementById('strokeWidth').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { strokeWidth: parseFloat(e.target.value) });
    });
    document.getElementById('strokeColor').addEventListener('input', (e) => {
        const selected = manager.getSelected();
        if (selected) manager.updateObjectProperties(selected.id, { stroke: e.target.value });
    });
    document.getElementById('addObjectBtn').addEventListener('click', () => {
        const types = ['star', 'circle', 'rect', 'triangle'];
        const randomType = types[Math.floor(Math.random() * types.length)];
        const randomX = Math.random() * 800 - 400;
        const randomY = Math.random() * 600 - 300;
        manager.addObject(randomType, `Object ${manager.nextId}`, randomX, randomY, `hsl(${Math.random() * 360}, 70%, 60%)`, '#2c3e50', 2);
    });
    document.getElementById('duplicateBtn').addEventListener('click', () => {
        if (manager.selectedId) manager.duplicateObject(manager.selectedId);
    });
    document.getElementById('applyAnimBtn').addEventListener('click', () => manager.applyAnimationToSelected());
    document.getElementById('stopAnimBtn').addEventListener('click', () => manager.stopSelectedAnimation());
    document.getElementById('resetCameraBtn').addEventListener('click', () => manager.resetView());
    document.getElementById('exportBtn').addEventListener('click', () => manager.exportSVG());
</script>
</body>
</html>
